name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install dependencies
      run: |
        pip install pyspark==3.5.0 delta-spark==3.0.0 pytest pytest-cov

   - name: Run unit tests
      run: |
        export PYSPARK_PYTHON=python
        export PYSPARK_DRIVER_PYTHON=python
        pytest tests/unit/ -v --tb=short

    - name: Upload coverage report
      run: |
        pytest tests/unit/ --cov=transformation --cov-report=term-missing